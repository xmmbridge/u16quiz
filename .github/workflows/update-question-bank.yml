name: Update question bank

# Run manually from the "Actions" tab after editing/adding XML files in the
# question-bank/ folder on GitHub. Re-parses them and updates question_templates
# in Supabase. Does NOT touch any already-generated quizzes.
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Re-import question bank
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/updateQuestionBank.mjs
